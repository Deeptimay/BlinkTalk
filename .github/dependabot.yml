version: 2
updates:
  # GitHub Actions used in your workflow files (.github/workflows/*.yml)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"

  # Dart / Flutter packages (pubspec.yaml)
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dart-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "chore"

  # Gradle / Android dependencies (android/build.gradle.kts, etc.)
  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "weekly"
    groups:
      gradle-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "chore"