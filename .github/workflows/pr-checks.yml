name: PR Checks

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  format:
    name: Dart Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .

  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter analyze

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter test --coverage

  android-lint:
    name: Android Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Get Flutter dependencies
        run: flutter pub get
      - name: Create local.properties
        run: echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
      - name: Verify local.properties
        run: cat android/local.properties
      - name: Make gradlew executable
        run: chmod +x android/gradlew
      - name: Run Android Lint
        working-directory: android
        run: ./gradlew lintDebug

  detekt:
    name: Kotlin Detekt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Get Flutter dependencies
        run: flutter pub get
      - name: Create local.properties
        run: echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
      - name: Verify local.properties
        run: cat android/local.properties
      - name: Make gradlew executable
        run: chmod +x android/gradlew
      - name: Run Detekt
        working-directory: android
        run: ./gradlew detektDebug

  build:
    name: Build App Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - run: flutter pub get
      - run: flutter build appbundle --debug
      - name: Upload App Bundle
        uses: actions/upload-artifact@v7
        with:
          name: debug-app-bundle
          path: build/app/outputs/bundle/debug/app-debug.aab
