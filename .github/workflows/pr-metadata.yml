name: PR Metadata

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches:
      - develop
      - main

jobs:
  pr-metadata:
    name: PR Title & Summary Check
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title (Conventional Commits)
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            style
            refactor
            perf
            test
            build
            ci
            revert
          requireScope: false

      - name: Validate PR has a summary
        uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.pull_request.body || "").trim();
            const minLength = 20;
            if (body.length < minLength) {
              core.setFailed(
                `PR description is missing or too short (${body.length} characters, need at least ${minLength}). ` +
                `Please add a summary explaining what this PR does and why.`
              );
            }
