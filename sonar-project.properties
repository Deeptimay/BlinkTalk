# Project Metadata
sonar.projectKey=9ea6ae4895e89c1fca5991545403730686f96c3a
sonar.organization=deeptimay
sonar.projectName=BlinkTalk
sonar.projectVersion=1.0.0
sonar.host.url=https://sonarcloud.io

# Source and Test Locations
sonar.sources=lib,android/app/src/main/kotlin
sonar.tests=test
sonar.sourceEncoding=UTF-8

# Languages
sonar.language=dart
sonar.kotlin.version=1.9 # Align with your project's Kotlin version

# Coverage Reporting
sonar.dart.lcov.reportPath=coverage/lcov.info

# Android Native Reports
sonar.androidLint.reportPaths=android/app/build/reports/lint-results-debug.xml
sonar.kotlin.detekt.reportPaths=android/app/build/reports/detekt/debug.xml

# Industry Standard Exclusions
# Excludes generated code, mocks, and platform-specific boilerplate that shouldn't affect quality scores
sonar.exclusions=\
  **/*.g.dart,\
  **/*.freezed.dart,\
  lib/generated/**,\
  lib/firebase_options.dart,\
  android/**/generated/**,\
  ios/Flutter/Generated.xcconfig,\
  **/*.mock.dart

# Test Exclusions (Don't analyze tests for coverage/complexity)
sonar.test.exclusions=test/**
